<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis - Public Evacuation Portal</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Map as full background */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .top-bar h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--danger);
            background: var(--danger-bg);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Floating Sidebar */
        .sidebar {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 380px;
            bottom: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .info-panel h2 {
            margin: 0 0 20px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .alerts-scroll {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .alerts-scroll::-webkit-scrollbar { width: 6px; }
        .alerts-scroll::-webkit-scrollbar-track { background: transparent; }
        .alerts-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .alert-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 4px solid var(--danger);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .alert-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.06);
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .alert-header h3 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .threat-badge {
            background: var(--danger-bg);
            color: var(--danger);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .route-info {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            color: #34d399;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .route-info strong { color: #fff; }
        .route-info h3 { margin-top: 0; font-size: 1rem; color: #fff; }
        .route-info p { margin-bottom: 5px; }

        /* Media Query for Mobile */
        @media (max-width: 768px) {
            .sidebar {
                top: auto;
                right: 0;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 45vh;
                border-radius: 20px 20px 0 0;
            }
            .info-panel {
                border-radius: 20px 20px 0 0;
            }
            .top-bar {
                top: 10px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="top-bar">
        <h1>AEGIS Portal</h1>
        <div class="live-indicator">
            <div class="pulse"></div>
            LIVE
        </div>
    </div>
    
    <div class="sidebar">
        <div class="info-panel">
            <h2>Active Evacuation Directives</h2>
            <div class="alerts-scroll" id="alerts-container">
                <div style="text-align:center; color: var(--text-muted); margin-top: 20px;">
                    Secure connection established. Waiting for broadcasts...
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Init Map
        let map = L.map('map', {zoomControl: false}).setView([46.21, -123.82], 13);
        L.control.zoom({position: 'bottomleft'}).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let reportsData = {{ events | tojson | safe }};
        let markers = [];
        let sensorMarkers = {};

        function renderSensor(data) {
            if (sensorMarkers[data.sensor_id]) {
                map.removeLayer(sensorMarkers[data.sensor_id]);
            }
            
            let color = '#10b981';
            if (data.value > 100) color = '#f59e0b';
            if (data.value > 200) color = '#ef4444';
            
            const marker = L.circleMarker([data.latitude, data.longitude], {
                color: color, fillColor: color, fillOpacity: 0.8, radius: 5
            }).bindPopup(`<b>Smart City Sensor</b><br>AQI: ${data.value.toFixed(1)}`).addTo(map);
            
            sensorMarkers[data.sensor_id] = marker;
        }
        
        function renderAlerts() {
            const container = document.getElementById('alerts-container');
            
            if (reportsData.length === 0) {
                container.innerHTML = '<div style="text-align:center; color: #94a3b8; margin-top: 20px;">No active emergencies.</div>';
                return;
            }
            
            container.innerHTML = '';
            
            // Clear old markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            const recent = reportsData.slice().reverse().slice(0, 10);
            
            recent.forEach(evt => {
                const r = evt.report;
                const planText = evt.result.dispatch_plan || "";
                
                // Extract route info
                const routeMatch = planText.match(/### [23]. Evacuation Route(.*?)(?=###|$)/s);
                let routeHtml = routeMatch ? marked.parse(routeMatch[0]) : "Follow local authorities.";

                const card = document.createElement('div');
                card.className = 'alert-card';
                card.innerHTML = `
                    <div class="alert-header">
                        <h3 style="margin:0">${r.category.replace('_', ' ').toUpperCase()}</h3>
                        <span class="threat-badge">${r.threat_level}</span>
                    </div>
                    <div style="font-size:0.85rem; color: #94a3b8; margin-bottom: 5px;">📍 Near ${r.location.latitude.toFixed(4)}, ${r.location.longitude.toFixed(4)}</div>
                    <div class="route-info">${routeHtml}</div>
                `;
                container.appendChild(card);
                
                // Add map marker with pulse
                const pulseIcon = L.divIcon({
                    html: '<div style="width: 20px; height: 20px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 0 10px rgba(239, 68, 68, 0.4); animation: pulse-animation 2s infinite;"></div>',
                    className: '',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });

                const m = L.marker([r.location.latitude, r.location.longitude], {icon: pulseIcon})
                    .bindPopup(`<b>${r.category.toUpperCase()}</b><br>Evacuate immediately.`).addTo(map);
                markers.push(m);
            });
            
            if (recent.length > 0) {
                map.flyTo([recent[0].report.location.latitude, recent[0].report.location.longitude], 14, {duration: 1.5});
            }
        }
        
        renderAlerts();

        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${protocol}//${window.location.host}/api/v1/ws`;
        const ws = new WebSocket(wsUrl);
        
        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                
                if (data.msg_type === "sensor") {
                    renderSensor(data);
                    return;
                }
                
                if (data.events && data.events.length !== reportsData.length) {
                    reportsData = data.events;
                    renderAlerts();
                }
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
