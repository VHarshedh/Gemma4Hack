services:
  command-center:
    build: .
    ports:
      - "8091:8091"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=gis-db
      - DB_PORT=5432
      - DB_USER=aegis
      - DB_PASS=aegis_secure
      - DB_NAME=aegis_gis
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    depends_on:
      - gis-db
      - mqtt-broker

  gis-db:
    image: postgis/postgis:15-3.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis_secure
      - POSTGRES_DB=aegis_gis
    volumes:
      - pgdata:/var/lib/postgresql/data

  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  pgdata:
